  - description: "Follow-up message uses correct Norwegian without English"
    vars:
      system_prompt_text: "Du er en kiropraktor-assistent som følger opp pasienter etter behandling. Skriv alltid på norsk bokmål."
      prompt_text: "Skriv en oppfølgingsmelding til en pasient som var til behandling for nakkesmerter i går. Spør hvordan de har det og påminn om hjemmeøvelsene."
      required_keywords: '["behandling"]'
      forbidden_keywords: '["treatment", "exercises", "feel", "how are you", "neck pain"]'
      expect_norwegian: "true"
      min_response_length: "80"
      max_response_length: "500"
      category: "norwegian_language"
    assert:
