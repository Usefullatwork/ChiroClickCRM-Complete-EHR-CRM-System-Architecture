# v2.1 Communication suite — ChiroClickEHR
# Tests patient communication, document delivery, exercise compliance messaging
# Run with: npx promptfoo eval -c suites/v21-communication.yaml

description: v2.1 Communication Quality Tests

providers:
  - id: ollama:chiro-no-sft-dpo-v6
    label: "v6-production"
    config:
      temperature: 0.3

prompts:
  - "{{system_prompt_text}}\n\n{{prompt_text}}"

tests:
  # ── SMS Length Constraint ──
  - description: "SMS appointment reminder stays under 160 chars"
    vars:
      system_prompt_text: "Du er en kommunikasjonsassistent for en kiropraktorklinikk i Norge. Skriv alltid korte, presise SMS-meldinger på norsk. Maks 160 tegn."
      prompt_text: "Skriv en SMS-påminnelse om time i morgen kl 14:30 hos kiropraktor Nordmann. Maks 160 tegn."
      required_keywords: '["time"]'
      forbidden_keywords: "[]"
      expect_norwegian: "true"
      min_response_length: "30"
      max_response_length: "160"
      category: "communication_tone"
    assert:
      - type: javascript
        value: "file://scripts/custom-assertions.js:keywordsPresent"
      - type: javascript
        value: "file://scripts/custom-assertions.js:norwegianQuality"
      - type: javascript
        value: "file://scripts/custom-assertions.js:responseLengthRange"
    metadata:
      id: sms_appointment_reminder
      category: v21_communication

  - description: "SMS document notification stays under 160 chars"
    vars:
      system_prompt_text: "Du er en kommunikasjonsassistent for en kiropraktorklinikk i Norge. Skriv alltid korte, presise SMS-meldinger på norsk. Maks 160 tegn."
      prompt_text: "Skriv en SMS som varsler pasienten om at et nytt dokument er tilgjengelig i pasientportalen. Maks 160 tegn."
      required_keywords: '["dokument"]'
      forbidden_keywords: "[]"
      expect_norwegian: "true"
      min_response_length: "30"
      max_response_length: "160"
      category: "communication_tone"
    assert:
      - type: javascript
        value: "file://scripts/custom-assertions.js:keywordsPresent"
      - type: javascript
        value: "file://scripts/custom-assertions.js:norwegianQuality"
      - type: javascript
        value: "file://scripts/custom-assertions.js:responseLengthRange"
    metadata:
      id: sms_document_ready
      category: v21_communication

  - description: "SMS exercise reminder stays under 160 chars"
    vars:
      system_prompt_text: "Du er en kommunikasjonsassistent for en kiropraktorklinikk i Norge. Skriv alltid korte, presise SMS-meldinger på norsk. Maks 160 tegn."
      prompt_text: "Skriv en kort SMS-påminnelse som minner pasienten på å gjøre hjemmeøvelsene sine i dag. Maks 160 tegn."
      required_keywords: '["øvelse"]'
      forbidden_keywords: "[]"
      expect_norwegian: "true"
      min_response_length: "20"
      max_response_length: "160"
      category: "communication_tone"
    assert:
      - type: javascript
        value: "file://scripts/custom-assertions.js:keywordsPresent"
      - type: javascript
        value: "file://scripts/custom-assertions.js:norwegianQuality"
      - type: javascript
        value: "file://scripts/custom-assertions.js:responseLengthRange"
    metadata:
      id: sms_exercise_nudge
      category: v21_communication

  # ── Norwegian Language Quality in Messages ──
