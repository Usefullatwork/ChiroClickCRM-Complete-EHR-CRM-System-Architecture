name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "count=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} | wc -l)" >> $GITHUB_OUTPUT

      - name: Check for patient data patterns
        run: |
          ISSUES=""
          for file in ${{ steps.changed.outputs.files }}; do
            if [ -f "$file" ]; then
              # Check for fødselsnummer patterns (11 digits that look like Norwegian national IDs)
              if grep -Pn '\b\d{11}\b' "$file" 2>/dev/null | grep -v -E '(test|mock|\.sql|seeds)'; then
                ISSUES="$ISSUES\n⚠️ Possible fødselsnummer in $file"
              fi
              # Check for SQL string concatenation
              if grep -Pn "query\s*\(.*\+.*\+|query\s*\(\`[^\`]*\\\$\{" "$file" 2>/dev/null; then
                ISSUES="$ISSUES\n🔴 SQL string concatenation in $file — use parameterized queries"
              fi
              # Check for console.log in non-test files
              if echo "$file" | grep -qE '\.(js|jsx|ts|tsx)$' && ! echo "$file" | grep -qE '(test|spec|__tests__)'; then
                if grep -n 'console\.log' "$file" 2>/dev/null; then
                  ISSUES="$ISSUES\n⚠️ console.log found in $file — use logger instead"
                fi
              fi
            fi
          done

          if [ -n "$ISSUES" ]; then
            echo "REVIEW_ISSUES<<EOF" >> $GITHUB_ENV
            echo -e "$ISSUES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Check file sizes
        run: |
          LARGE_FILES=""
          for file in ${{ steps.changed.outputs.files }}; do
            if [ -f "$file" ] && echo "$file" | grep -qE '\.(js|jsx|ts|tsx)$'; then
              LINES=$(wc -l < "$file")
              if [ "$LINES" -gt 500 ]; then
                LARGE_FILES="$LARGE_FILES\n⚠️ $file has $LINES lines (limit: 500)"
              fi
            fi
          done

          if [ -n "$LARGE_FILES" ]; then
            echo "LARGE_FILES<<EOF" >> $GITHUB_ENV
            echo -e "$LARGE_FILES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Post review comment
        if: env.REVIEW_ISSUES != '' || env.LARGE_FILES != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issues = process.env.REVIEW_ISSUES || '';
            const largeFiles = process.env.LARGE_FILES || '';

            let body = '## 🤖 Automated Code Review\n\n';

            if (issues) {
              body += '### Security & Quality Issues\n\n' + issues + '\n\n';
            }

            if (largeFiles) {
              body += '### File Size Warnings\n\n' + largeFiles + '\n\n';
            }

            body += '---\n*Automated by ChiroClickCRM CI*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
